<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>교육에서 취업까지, 3대 핵심 전략</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ─── Section shell ─── */
  .section-wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  @keyframes bgZoom {
    from { transform: scale(1);    }
    to   { transform: scale(1.12); }
  }

  /* Full-bleed background photo */
  .section-wrap > .bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    transform-origin: center center;
    animation: bgZoom 14s ease-in-out infinite alternate;
  }

  /* Dark scrim */
  .section-wrap > .bg-scrim {
    position: absolute;
    inset: 0;
    background: rgba(22, 22, 22, 0.60);
    z-index: 1;
  }

  /* ─── Content ─── */
  .content-row {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    padding: 0 9.375vw;
    display: flex;
    align-items: center;
    gap: 1.25vw;
  }

  /* ─── Left heading ─── */
  .left-block {
    flex-shrink: 0;
    width: 31vw;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .lbl-goal {
    font-size: 14px;
    font-weight: 400;
    color: #ff6c00;
    line-height: 1.5;
  }

  .section-title {
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    line-height: 1.5;
  }

  /* ─── Cards column ─── */
  .cards-col {
    display: flex;
    flex-direction: column;
    gap: 3vh;
    flex-shrink: 0;
  }

  /* ─── Card ─── */
  /*
    The card itself has:
      - the same bg photo (positioned so it aligns with the section photo)
      - a navy alpha overlay on top
      - a 1px #656565 border (via outline, so it doesn't affect layout)

    The orange sweep is drawn by a pseudo-element using clip-path animation.
    We use `border` for the grey default stroke and a separate `::after`
    pseudo-element (inset outline + clip-path reveal) for the orange sweep.
  */
  .step-card {
    position: relative;
    border-radius: 16px;
    border: 1px solid #656565;
    width: 49vw;
    height: 15.2vh;
    flex-shrink: 0;
    padding: 2.6vh 40px;
    display: flex;
    align-items: center;
    gap: 24px;
    cursor: default;
    isolation: isolate;
  }

  /* Card background: solid #002169 at 60% only — no photo */
  .step-card > .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 33, 105, 0.60);
    z-index: 0;
    border-radius: 15px;
    pointer-events: none;
  }

  /*
    Orange border sweep:
    ::after draws the full orange 1.5px border on top of the grey one.
    clip-path starts fully clipped from the right side (nothing visible),
    and animates to fully revealed — giving a clean left→right sweep.
  */
  .step-card::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 16px;
    border: 1.5px solid #ff6c00;
    z-index: 5;
    pointer-events: none;
    /* Hidden: clipped from right edge */
    clip-path: inset(0 100% 0 0 round 16px);
    transition: clip-path 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Hover: reveal the full orange border sweeping left → right */
  .step-card:hover::after {
    clip-path: inset(0 0% 0 0 round 16px);
  }

  /* ─── Card inner content (above bg layers) ─── */
  .card-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 24px;
    width: 100%;
  }

  /* ─── Icon ─── */
  .step-icon {
    width: 84px;
    height: 24px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }

  .step-icon img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }

  /* ─── Text ─── */
  .step-text {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .step-title {
    font-size: 24px;
    font-weight: 600;
    color: #fff;
    line-height: 1.5;
  }

  .step-desc {
    font-size: 16px;
    font-weight: 400;
    color: #dcdcdc;
    line-height: 1.5;
  }
</style>
</head>
